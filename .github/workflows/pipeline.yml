name: Unified Pipeline

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

  lint:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  static-analysis:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

  dead-code-analysis:
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run knip analysis
        shell: bash
        run: npm run analyze:knip | tee knip-report.txt

      - name: Upload knip report
        uses: actions/upload-artifact@v4
        with:
          name: knip-report
          path: knip-report.txt
          if-no-files-found: error

  architecture-graph:
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate dependency graph artifacts
        run: npm run graph:dependencies

      - name: Upload dependency graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: reports/dependency-graph
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    needs: dead-code-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  coverage-report:
    runs-on: ubuntu-latest
    needs: dead-code-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci:coverage

      - name: Generate coverage summary file
        shell: bash
        run: |
          node -e "const fs=require('fs');const path=require('path');const candidates=['coverage/coverage-summary.json','coverage/**/coverage-summary.json'];let file='';if(fs.existsSync(candidates[0])){file=candidates[0];}else{const coverageDir='coverage';if(fs.existsSync(coverageDir)){const dirs=fs.readdirSync(coverageDir,{withFileTypes:true}).filter(d=>d.isDirectory()).map(d=>path.join(coverageDir,d.name,'coverage-summary.json'));file=dirs.find(f=>fs.existsSync(f))||'';}}const out='coverage/coverage-summary.txt';if(!file){fs.mkdirSync('coverage',{recursive:true});fs.writeFileSync(out,'Coverage summary JSON not found. Check HTML report in coverage/.\n');process.exit(0);}const data=JSON.parse(fs.readFileSync(file,'utf8'));const t=data.total||{};const lines=['Coverage Summary','================','',`Statements: ${t.statements?.pct ?? 'n/a'}%`,`Branches: ${t.branches?.pct ?? 'n/a'}%`,`Functions: ${t.functions?.pct ?? 'n/a'}%`,`Lines: ${t.lines?.pct ?? 'n/a'}%`,`Source: ${file}`,''];fs.writeFileSync(out,lines.join('\n'));"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

  pages-artifact:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build, lint, static-analysis, dead-code-analysis, architecture-graph, test, coverage-report]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app for GitHub Pages
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/mealcraft/browser

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: pages-artifact

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
