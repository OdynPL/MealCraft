<mat-toolbar color="primary" class="header-toolbar">
  <a class="logo" routerLink="/home" (click)="resetState()" aria-label="MealCraft home">
    <span class="logo-mark" aria-hidden="true">
      <img src="brand-icon.svg" alt="" />
    </span>
    <span class="logo-text">
      <strong>MealCraft</strong>
      <small>Food Explorer</small>
    </span>
  </a>

  <span class="spacer"></span>

  <nav class="desktop-nav" aria-label="Main navigation">
    <button mat-button routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" (click)="resetState()">
      Home
    </button>

    @if (isLoggedIn()) {
      <button mat-button routerLink="/meals/new" routerLinkActive="active-link">Add recipe</button>
      <button mat-button routerLink="/settings" routerLinkActive="active-link">Settings</button>
      <span class="user-profile" aria-label="Logged user profile">
        <span class="avatar" aria-hidden="true">
          @if (userAvatar()) {
            <img [src]="userAvatar()" alt="User avatar" />
          } @else {
            <span class="avatar-fallback">{{ userInitials() }}</span>
          }
        </span>
        <span class="user-name">{{ userFullName() }}</span>
      </span>
      <button mat-button type="button" (click)="logout()">Logout</button>
    } @else {
      <button mat-button routerLink="/login" routerLinkActive="active-link">Login</button>
      <button mat-button routerLink="/register" routerLinkActive="active-link">Register</button>
    }
  </nav>

  <button
    mat-icon-button
    type="button"
    class="mobile-menu-trigger"
    [matMenuTriggerFor]="mobileMenu"
    aria-label="Open navigation menu"
  >
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #mobileMenu="matMenu" xPosition="before" panelClass="app-mobile-menu">
  <button mat-menu-item routerLink="/home" (click)="resetState()">
    <mat-icon>home</mat-icon>
    <span>Home</span>
  </button>

  @if (isLoggedIn()) {
    <button mat-menu-item routerLink="/meals/new">
      <mat-icon>add_circle</mat-icon>
      <span>Add recipe</span>
    </button>
    <button mat-menu-item routerLink="/settings">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <button mat-menu-item type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  } @else {
    <button mat-menu-item routerLink="/login">
      <mat-icon>login</mat-icon>
      <span>Login</span>
    </button>
    <button mat-menu-item routerLink="/register">
      <mat-icon>person_add</mat-icon>
      <span>Register</span>
    </button>
  }
</mat-menu>
